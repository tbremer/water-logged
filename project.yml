name: WaterLogged
options:
  bundleIdPrefix: com.tbremer
  deploymentTarget:
    watchOS: "10.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Swift 5 language mode keeps strict-concurrency lenient for a clean first build.
    # Bump to "6.0" later if you want full Swift 6 concurrency checking.
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "Z5DFW5G77C"   # Apple Developer Team ID (kept here so it survives `xcodegen generate`)
    CODE_SIGN_STYLE: Automatic
    # Xcode "recommended settings" (silences the project's update-to-recommended warning).
    ENABLE_USER_SCRIPT_SANDBOXING: YES   # sandbox run-script phases for build correctness
    STRING_CATALOG_GENERATE_SYMBOLS: YES # generate Swift symbols for String Catalog strings

targets:
  WaterLogged:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WaterLogged
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tbremer.waterlogged
        PRODUCT_NAME: WaterLogged
        INFOPLIST_FILE: WaterLogged/Info.plist
        CODE_SIGN_ENTITLEMENTS: WaterLogged/WaterLogged.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"        # 4 = Apple Watch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Explicitly decline generated asset symbol extensions so Xcode stops
        # offering it as a "recommended setting" after each xcodegen regenerate.
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES

schemes:
  WaterLogged:
    build:
      targets:
        WaterLogged: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
